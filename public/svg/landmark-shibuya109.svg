<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <!-- 渋谷109 - デフォルメ円筒ビル -->
  <!-- ビル本体（丸みのある円筒形） -->
  <path d="M30 140 L30 50 Q30 30 60 25 Q90 30 90 50 L90 140 Z" fill="#8B6F9E" stroke="#5A4670" stroke-width="2"/>
  <!-- 窓グリッド -->
  <rect x="38" y="55" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.8"/>
  <rect x="55" y="55" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.6"/>
  <rect x="72" y="55" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.9"/>
  <rect x="38" y="70" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.7"/>
  <rect x="55" y="70" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.5"/>
  <rect x="72" y="70" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.8"/>
  <rect x="38" y="85" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.9"/>
  <rect x="55" y="85" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.7"/>
  <rect x="72" y="85" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.6"/>
  <rect x="38" y="100" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.8"/>
  <rect x="55" y="100" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.9"/>
  <rect x="72" y="100" width="10" height="8" rx="1" fill="#FFE4A0" opacity="0.7"/>
  <!-- 屋上の丸い看板 -->
  <ellipse cx="60" cy="28" rx="22" ry="12" fill="#FF3366" stroke="#CC1144" stroke-width="1.5"/>
  <text x="60" y="32" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="sans-serif">109</text>
  <!-- エントランス -->
  <rect x="45" y="120" width="30" height="20" rx="3" fill="#6B5280" stroke="#5A4670" stroke-width="1"/>
  <rect x="52" y="125" width="16" height="15" rx="2" fill="#FFE4A0" opacity="0.9"/>
  <!-- 地面 -->
  <line x1="15" y1="140" x2="105" y2="140" stroke="#5A4670" stroke-width="2"/>
  <!-- ネオンアクセント -->
  <circle cx="60" cy="45" r="2" fill="#FF69B4" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
