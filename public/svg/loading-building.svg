<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- ローディングアニメーション: 断面図ビルが段階的に組み上がる -->

  <!-- 地面ライン -->
  <line x1="30" y1="170" x2="170" y2="170" stroke="#5A4670" stroke-width="2" opacity="0.5"/>

  <!-- ビル外枠（X線スタイル） -->
  <rect x="50" y="40" width="100" height="130" rx="2" stroke="#A0D2DB" stroke-width="1.5" fill="none" opacity="0.3">
    <animate attributeName="opacity" values="0;0.3" dur="0.5s" fill="freeze"/>
  </rect>

  <!-- 1階（最初に表示） -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.2s" fill="freeze"/>
    <rect x="55" y="140" width="90" height="25" fill="#1A1A2E" stroke="#A0D2DB" stroke-width="0.8" opacity="0.4"/>
    <rect x="65" y="148" width="12" height="14" rx="1" fill="#FFE4A0" opacity="0.6"/>
    <rect x="85" y="148" width="12" height="14" rx="1" fill="#FFE4A0" opacity="0.4"/>
    <rect x="115" y="148" width="12" height="14" rx="1" fill="#FF69B4" opacity="0.5"/>
    <!-- アバターシルエット -->
    <circle cx="71" cy="155" r="2" fill="#FF69B4" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="91" cy="155" r="2" fill="#87CEEB" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 2階 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.6s" fill="freeze"/>
    <rect x="55" y="110" width="90" height="25" fill="#1A1A2E" stroke="#A0D2DB" stroke-width="0.8" opacity="0.4"/>
    <rect x="60" y="118" width="10" height="12" rx="1" fill="#FFE4A0" opacity="0.5"/>
    <rect x="78" y="118" width="10" height="12" rx="1" fill="#FFE4A0" opacity="0.7"/>
    <rect x="100" y="118" width="10" height="12" rx="1" fill="#FFE4A0" opacity="0.3"/>
    <rect x="120" y="118" width="10" height="12" rx="1" fill="#FF8C42" opacity="0.5"/>
    <!-- アバターシルエット -->
    <circle cx="83" cy="124" r="2" fill="#FF4444" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="125" cy="124" r="2" fill="#DDA0DD" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 3階 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.0s" fill="freeze"/>
    <rect x="55" y="80" width="90" height="25" fill="#1A1A2E" stroke="#A0D2DB" stroke-width="0.8" opacity="0.4"/>
    <rect x="62" y="88" width="10" height="12" rx="1" fill="#FFE4A0" opacity="0.6"/>
    <rect x="80" y="88" width="10" height="12" rx="1" fill="#FFE4A0" opacity="0.4"/>
    <rect x="108" y="88" width="10" height="12" rx="1" fill="#FFD700" opacity="0.5"/>
    <!-- アバターシルエット -->
    <circle cx="67" cy="94" r="2" fill="#FF1493" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="113" cy="94" r="2" fill="#87CEEB" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 屋上 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/>
    <rect x="55" y="40" width="90" height="35" fill="#1A1A2E" stroke="#A0D2DB" stroke-width="0.8" opacity="0.4"/>
    <rect x="75" y="32" width="50" height="10" rx="2" fill="#2A1F3D" stroke="#A0D2DB" stroke-width="0.5" opacity="0.3"/>
    <!-- アンテナ -->
    <line x1="100" y1="32" x2="100" y2="22" stroke="#A0D2DB" stroke-width="1" opacity="0.4"/>
    <circle cx="100" cy="20" r="2" fill="#FF0000" opacity="0.8">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- オーラエフェクト（全体に） -->
  <ellipse cx="100" cy="120" rx="60" ry="40" fill="url(#auraGrad)" opacity="0">
    <animate attributeName="opacity" values="0;0.15;0" dur="3s" begin="1.8s" repeatCount="indefinite"/>
  </ellipse>

  <defs>
    <radialGradient id="auraGrad">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
