<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" fill="none">
  <!-- 六本木ヒルズ森タワー - デフォルメ高層ビル -->
  <!-- メインタワー -->
  <path d="M35 160 L38 30 Q40 20 60 18 Q80 20 82 30 L85 160 Z" fill="#4A5568" stroke="#2D3748" stroke-width="2"/>
  <!-- セットバック（段差） -->
  <path d="M40 120 L42 55 Q44 48 60 46 Q76 48 78 55 L80 120" fill="#5A6A7E" stroke="#2D3748" stroke-width="1" opacity="0.6"/>

  <!-- 窓グリッド（縦長の現代的な窓） -->
  <!-- 低層部 -->
  <rect x="42" y="130" width="4" height="12" rx="0.5" fill="#A0D2DB" opacity="0.5"/>
  <rect x="49" y="130" width="4" height="12" rx="0.5" fill="#A0D2DB" opacity="0.7"/>
  <rect x="56" y="130" width="4" height="12" rx="0.5" fill="#A0D2DB" opacity="0.4"/>
  <rect x="63" y="130" width="4" height="12" rx="0.5" fill="#A0D2DB" opacity="0.6"/>
  <rect x="70" y="130" width="4" height="12" rx="0.5" fill="#A0D2DB" opacity="0.5"/>
  <!-- 中層部 -->
  <rect x="44" y="100" width="3" height="10" rx="0.5" fill="#A0D2DB" opacity="0.6"/>
  <rect x="50" y="100" width="3" height="10" rx="0.5" fill="#A0D2DB" opacity="0.4"/>
  <rect x="56" y="100" width="3" height="10" rx="0.5" fill="#A0D2DB" opacity="0.7"/>
  <rect x="62" y="100" width="3" height="10" rx="0.5" fill="#A0D2DB" opacity="0.5"/>
  <rect x="68" y="100" width="3" height="10" rx="0.5" fill="#A0D2DB" opacity="0.6"/>
  <!-- 高層部 -->
  <rect x="46" y="70" width="3" height="8" rx="0.5" fill="#A0D2DB" opacity="0.5"/>
  <rect x="52" y="70" width="3" height="8" rx="0.5" fill="#A0D2DB" opacity="0.7"/>
  <rect x="58" y="70" width="3" height="8" rx="0.5" fill="#A0D2DB" opacity="0.4"/>
  <rect x="64" y="70" width="3" height="8" rx="0.5" fill="#A0D2DB" opacity="0.6"/>

  <!-- 屋上構造物 -->
  <rect x="52" y="18" width="16" height="8" rx="2" fill="#2D3748"/>
  <rect x="56" y="12" width="8" height="6" rx="1" fill="#2D3748"/>
  <!-- 航空障害灯 -->
  <circle cx="60" cy="12" r="2" fill="#FF0000">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 蜘蛛のオブジェ（ママン） -->
  <g transform="translate(20, 148)" opacity="0.7">
    <!-- 体 -->
    <ellipse cx="0" cy="0" rx="4" ry="2.5" fill="#1A202C"/>
    <!-- 脚 -->
    <line x1="-3" y1="0" x2="-8" y2="-5" stroke="#1A202C" stroke-width="1"/>
    <line x1="-2" y1="1" x2="-7" y2="5" stroke="#1A202C" stroke-width="1"/>
    <line x1="3" y1="0" x2="8" y2="-5" stroke="#1A202C" stroke-width="1"/>
    <line x1="2" y1="1" x2="7" y2="5" stroke="#1A202C" stroke-width="1"/>
    <line x1="-1" y1="-1" x2="-6" y2="-7" stroke="#1A202C" stroke-width="1"/>
    <line x1="1" y1="-1" x2="6" y2="-7" stroke="#1A202C" stroke-width="1"/>
  </g>

  <!-- 地面 -->
  <line x1="10" y1="160" x2="110" y2="160" stroke="#2D3748" stroke-width="2"/>

  <!-- 周辺の低層ビル（スケール感） -->
  <rect x="10" y="145" width="18" height="15" fill="#718096" stroke="#2D3748" stroke-width="1" opacity="0.5"/>
  <rect x="92" y="148" width="15" height="12" fill="#718096" stroke="#2D3748" stroke-width="1" opacity="0.5"/>
</svg>
