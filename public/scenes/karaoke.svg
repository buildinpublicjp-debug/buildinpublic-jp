<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#18081e" stop-opacity="1"/>
      <stop offset="50%" stop-color="#100614" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050208" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="neon1" cx="30%" cy="30%" r="20%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff00ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neon2" cx="70%" cy="40%" r="18%">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neon3" cx="50%" cy="70%" r="25%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#neon1)"/>
  <rect width="1920" height="1080" fill="url(#neon2)"/>
  <rect width="1920" height="1080" fill="url(#neon3)"/>
  <!-- Neon bokeh -->
  <circle cx="500" cy="250" r="70" fill="#ff00ff" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="1300" cy="350" r="60" fill="#00ccff" opacity="0.05" filter="url(#blur1)"/>
  <circle cx="900" cy="700" r="80" fill="#ff3366" opacity="0.04" filter="url(#blur1)"/>
  <circle cx="200" cy="600" r="40" fill="#ffcc00" opacity="0.04" filter="url(#blur1)"/>
  <!-- Screen glow -->
  <rect x="600" y="150" width="720" height="400" rx="12" fill="#0a0614" opacity="0.6"/>
  <rect x="610" y="160" width="700" height="380" rx="8" fill="#1a1030" opacity="0.2"/>
  <!-- Sofa silhouette -->
  <rect x="300" y="750" width="1320" height="120" rx="30" fill="#080412" opacity="0.5"/>
