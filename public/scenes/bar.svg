<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#3d2040" stop-opacity="1"/>
      <stop offset="40%" stop-color="#221228" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0510" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="light1" cx="20%" cy="35%" r="20%">
      <stop offset="0%" stop-color="#ff6b3d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff6b3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light2" cx="78%" cy="30%" r="18%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light3" cx="50%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#ff0a28" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff0a28" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#light1)"/>
  <rect width="1920" height="1080" fill="url(#light2)"/>
  <rect width="1920" height="1080" fill="url(#light3)"/>
  <!-- Bokeh lights -->
  <circle cx="280" cy="260" r="80" fill="#ff6b3d" opacity="0.2" filter="url(#blur1)"/>
  <circle cx="1450" cy="300" r="100" fill="#c084fc" opacity="0.18" filter="url(#blur1)"/>
  <circle cx="750" cy="550" r="60" fill="#ff3366" opacity="0.15" filter="url(#blur1)"/>
  <circle cx="1650" cy="650" r="70" fill="#ffc832" opacity="0.12" filter="url(#blur1)"/>
  <circle cx="500" cy="400" r="40" fill="#ff9944" opacity="0.2" filter="url(#blur2)"/>
  <circle cx="1100" cy="350" r="50" fill="#ff6688" opacity="0.1" filter="url(#blur2)"/>
  <!-- Bar counter silhouette -->
  <rect x="0" y="720" width="1920" height="360" fill="#0a0610" opacity="0.6"/>
  <rect x="80" y="710" width="1760" height="10" rx="5" fill="#1a1028" opacity="0.5"/>
  <!-- Bottles silhouette -->
  <rect x="180" y="580" width="35" height="130" rx="8" fill="#150e22" opacity="0.5"/>
  <rect x="240" y="600" width="30" height="110" rx="7" fill="#150e22" opacity="0.45"/>
  <rect x="295" y="570" width="32" height="140" rx="8" fill="#150e22" opacity="0.5"/>
  <rect x="360" y="590" width="28" height="120" rx="6" fill="#150e22" opacity="0.4"/>
  <rect x="1380" y="590" width="35" height="120" rx="8" fill="#150e22" opacity="0.45"/>
  <rect x="1440" y="575" width="30" height="135" rx="7" fill="#150e22" opacity="0.5"/>
  <rect x="1500" y="600" width="32" height="110" rx="7" fill="#150e22" opacity="0.4"/>
  <!-- Warm light reflections on counter -->
  <ellipse cx="400" cy="720" rx="120" ry="8" fill="#ff8844" opacity="0.08"/>
  <ellipse cx="1200" cy="720" rx="150" ry="10" fill="#c084fc" opacity="0.06"/>
</svg>