<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2d1832" stop-opacity="1"/>
      <stop offset="50%" stop-color="#140a18" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050208" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="light1" cx="20%" cy="30%" r="15%">
      <stop offset="0%" stop-color="#ff6b3d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff6b3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light2" cx="75%" cy="35%" r="12%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light3" cx="50%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#ff0a28" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff0a28" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#light1)"/>
  <rect width="1920" height="1080" fill="url(#light2)"/>
  <rect width="1920" height="1080" fill="url(#light3)"/>
  <!-- Bokeh lights -->
  <circle cx="300" cy="280" r="60" fill="#ff6b3d" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1400" cy="320" r="80" fill="#c084fc" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="800" cy="600" r="45" fill="#ff3366" opacity="0.05" filter="url(#blur1)"/>
  <circle cx="1600" cy="700" r="50" fill="#ffc832" opacity="0.04" filter="url(#blur1)"/>
  <!-- Bar counter silhouette -->
  <rect x="0" y="750" width="1920" height="330" fill="#080410" opacity="0.7"/>
  <rect x="100" y="740" width="1720" height="8" rx="4" fill="#1a1020" opacity="0.6"/>
  <!-- Bottles silhouette -->
  <rect x="200" y="620" width="30" height="120" rx="6" fill="#0f0818" opacity="0.4"/>
  <rect x="260" y="640" width="25" height="100" rx="5" fill="#0f0818" opacity="0.35"/>
  <rect x="310" y="610" width="28" height="130" rx="6" fill="#0f0818" opacity="0.4"/>
  <rect x="1400" y="630" width="30" height="110" rx="6" fill="#0f0818" opacity="0.35"/>
  <rect x="1460" y="615" width="25" height="125" rx="5" fill="#0f0818" opacity="0.4"/>
</svg>