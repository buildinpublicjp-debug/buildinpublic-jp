<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a0e14" stop-opacity="1"/>
      <stop offset="50%" stop-color="#0f0810" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050205" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="warm1" cx="30%" cy="50%" r="25%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm2" cx="70%" cy="45%" r="20%">
      <stop offset="0%" stop-color="#ff6b3d" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff6b3d" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#warm1)"/>
  <rect width="1920" height="1080" fill="url(#warm2)"/>
  <!-- Soft warm light -->
  <circle cx="960" cy="400" r="200" fill="#ff2244" opacity="0.04" filter="url(#blur1)"/>
  <circle cx="400" cy="600" r="120" fill="#ff6644" opacity="0.03" filter="url(#blur1)"/>
  <!-- Window light -->
  <rect x="1300" y="100" width="300" height="500" rx="8" fill="#0a0610" opacity="0.5"/>
  <rect x="1310" y="110" width="280" height="480" rx="4" fill="#1a1428" opacity="0.15"/>
  <!-- Bed silhouette -->
  <ellipse cx="700" cy="800" rx="400" ry="80" fill="#0a0610" opacity="0.4"/>
  <rect x="350" y="720" width="700" height="20" rx="10" fill="#0f0818" opacity="0.3"/>
</svg>