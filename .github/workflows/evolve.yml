name: Evolve buildinpublic.jp

on:
  schedule:
    - cron: '0 17 * * *'  # 毎日深夜2時JST (UTC 17:00)
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # ── GUIDE: コメント取得（未使用 + 全履歴）──
      - name: Fetch comments from Supabase
        id: fetch
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node -e "
            const { createClient } = require('@supabase/supabase-js');
            const fs = require('fs');
            const sb = createClient(
              process.env.NEXT_PUBLIC_SUPABASE_URL,
              process.env.SUPABASE_SERVICE_KEY
            );

            // 未使用コメント（今回処理するもの）
            const newP = sb.from('comments')
              .select('*')
              .eq('used', false)
              .order('created_at', { ascending: true });

            // 全コメント履歴（used含む・コミュニティの総意を読むため）
            const allP = sb.from('comments')
              .select('*')
              .order('created_at', { ascending: true });

            Promise.all([newP, allP]).then(([newRes, allRes]) => {
              if (newRes.error) { console.error(newRes.error); process.exit(1); }
              if (allRes.error) { console.error(allRes.error); process.exit(1); }

              const newData = newRes.data || [];
              const allData = allRes.data || [];

              if (newData.length === 0) {
                console.log('新規コメントなし - スキップ');
                fs.writeFileSync('state/comments.json', '[]');
              } else {
                fs.writeFileSync('state/comments.json', JSON.stringify(newData, null, 2));
                console.log('新規: ' + newData.length + '件');
              }

              fs.writeFileSync('state/all_comments.json', JSON.stringify(allData, null, 2));
              console.log('全履歴: ' + allData.length + '件');
            });
          "

      - name: Check if comments exist
        id: check
        run: |
          COUNT=$(node -e "const d=require('./state/comments.json'); console.log(d.length)")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      # ── GUIDE: AIブレイン（全コメントの総意を読む）──
      - name: Run brain (AI decision engine)
        if: steps.check.outputs.count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx ts-node --skipProject -O '{"module":"commonjs"}' scripts/brain.ts

      # ── EXECUTE: CCがサイトを書き換える ──
      - name: Claude Code rewrites the site
        if: steps.check.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            CLAUDE.md を必ず最初に読んでください。
            その後、state/next_plan.md を読んで app/page.tsx を完全に書き換えてください。

            完了後:
            git config user.name "buildinpublic-bot"
            git config user.email "bot@buildinpublic.jp"
            git add app/page.tsx state/
            git commit -m "evolve: $(node -e "const v=require('./state/current_version.json'); console.log('v'+v.number)")"
            git push

      # ── SENSOR 1: ローカルビルド検証 ──
      - name: Sensor 1 - Local build check
        if: steps.check.outputs.count != '0'
        id: build_check
        run: |
          git pull
          npm run build
          echo "ok=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── SENSOR 2: インテリジェントQAサブエージェント ──
      - name: Install Playwright
        if: steps.check.outputs.count != '0' && steps.build_check.outputs.ok == 'true'
        run: |
          npm install -D @playwright/test
          npx playwright install chromium --with-deps

      - name: Wait for Vercel deploy
        if: steps.check.outputs.count != '0' && steps.build_check.outputs.ok == 'true'
        run: |
          echo "Vercelのデプロイ完了を待機中（2分）..."
          sleep 120

      - name: Sensor 2 - Intelligent QA subagent
        if: steps.check.outputs.count != '0' && steps.build_check.outputs.ok == 'true'
        id: qa_check
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            あなたはインテリジェントQAサブエージェントです。
            今回実装されたものを「実際に動くか」まで検証してください。

            ## 手順

            ### 1. 今回何が実装されたかを理解する
            以下を読んでください:
            - state/next_plan.md（今回のAIプラン）
            - app/page.tsx（実際に書かれたコード）
            - state/current_version.json（バージョン情報）

            ### 2. 実装内容に合わせたPlaywrightテストを自分で書く
            scripts/qa-dynamic.ts として今回の実装に特化したテストを作成してください。

            テストで必ずカバーすること:
            - ページが正常に読み込まれるか（iPhone 14 Proのviewport）
            - 今回実装した主要機能が実際に動くか（ゲームならプレイ、ボタンなら押す、アニメーションなら動くか等）
            - コメント送信フォームが機能するか（タップして入力して送信）
            - /versionsページに遷移できるか
            - コンソールエラーが出ていないか

            ### 3. テストを実行する
            npx ts-node --skipProject -O '{"module":"commonjs"}' scripts/qa-dynamic.ts

            ### 4. 各ステップでスクリーンショットを state/logs/ に保存する

            ### 5. state/logs/qa_result.json に結果を保存する

            ### 6. all_ok=true なら以下を実行:
            git config user.name "buildinpublic-bot"
            git config user.email "bot@buildinpublic.jp"
            git add state/logs/ scripts/qa-dynamic.ts
            git diff --staged --quiet || git commit -m "qa: passed"
            git push

            all_ok=false なら失敗ステップを出力してexit 1

      # ── SENSOR: 検証失敗時はrevert ──
      - name: Revert if QA failed
        if: |
          steps.check.outputs.count != '0' &&
          (steps.build_check.outputs.ok != 'true' || steps.qa_check.outcome == 'failure')
        run: |
          echo "⚠️ 検証失敗 - revertします"
          git pull
          git revert HEAD --no-edit || true
          git push || true
          mkdir -p state/logs
          REASON="${{ steps.build_check.outputs.ok != 'true' && 'build_failed' || 'qa_failed' }}"
          echo "{\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"$REASON\"}" >> state/logs/failures.jsonl
          git config user.name "buildinpublic-bot"
          git config user.email "bot@buildinpublic.jp"
          git add state/logs/
          git commit -m "log: revert $REASON" || true
          git push || true

      # ── 使用済みコメントマーク ──
      - name: Mark comments as used
        if: |
          steps.check.outputs.count != '0' &&
          steps.build_check.outputs.ok == 'true' &&
          steps.qa_check.outcome == 'success'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node -e "
            const { createClient } = require('@supabase/supabase-js');
            const fs = require('fs');
            const sb = createClient(
              process.env.NEXT_PUBLIC_SUPABASE_URL,
              process.env.SUPABASE_SERVICE_KEY
            );
            const comments = JSON.parse(fs.readFileSync('state/comments.json', 'utf-8'));
            const ids = comments.map(c => c.id);
            if (ids.length === 0) { process.exit(0); }
            sb.from('comments')
              .update({ used: true })
              .in('id', ids)
              .then(({ error }) => {
                if (error) console.error(error);
                else console.log(ids.length + '件を使用済みに更新');
              });
          "

      # ── OBSERVABILITY ──
      - name: Log execution result
        if: steps.check.outputs.count != '0'
        run: |
          mkdir -p state/logs
          BUILD="${{ steps.build_check.outputs.ok == 'true' && 'ok' || 'failed' }}"
          QA="${{ steps.qa_check.outcome == 'success' && 'ok' || 'failed' }}"
          STATUS="${{ steps.build_check.outputs.ok == 'true' && steps.qa_check.outcome == 'success' && 'success' || 'failed' }}"
          echo "{\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"$STATUS\",\"build\":\"$BUILD\",\"qa\":\"$QA\",\"comments\":${{ steps.check.outputs.count }}}" >> state/logs/executions.jsonl
          git config user.name "buildinpublic-bot"
          git config user.email "bot@buildinpublic.jp"
          git add state/logs/
          git diff --staged --quiet || git commit -m "log: $(date -u +%Y-%m-%d) $STATUS"
          git push
